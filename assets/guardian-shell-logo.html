<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>GUARDIAN SHELL — ロゴデザイン</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #0a0a14;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    overflow: hidden;
}
.logo-container {
    position: relative;
    width: 512px; height: 512px;
}
svg { width: 100%; height: 100%; }
.info {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    color: #7aa2f7; font-size: 14px;
    text-align: center;
    opacity: 0.7;
}
</style>
</head>
<body>
<div class="logo-container">
<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- クリスタルコアのグラデーション -->
    <radialGradient id="crystalCore" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#c0a0ff" stop-opacity="1"/>
      <stop offset="30%" stop-color="#7c3aed" stop-opacity="1"/>
      <stop offset="60%" stop-color="#4c1d95" stop-opacity="1"/>
      <stop offset="100%" stop-color="#1e0a3c" stop-opacity="1"/>
    </radialGradient>
    
    <!-- シールドのグロー -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 回路パターン -->
    <linearGradient id="circuit" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.9"/>
    </linearGradient>

    <!-- 六角形クリップ -->
    <clipPath id="hexClip">
      <polygon points="256,60 446,170 446,390 256,500 66,390 66,170"/>
    </clipPath>
  </defs>

  <!-- 背景のダークスペース -->
  <rect width="512" height="512" fill="#0a0a14"/>

  <!-- 回路線（背面） -->
  <g opacity="0.12">
    <line x1="80" y1="80" x2="200" y2="80" stroke="#22d3ee" stroke-width="1"/>
    <line x1="200" y1="80" x2="200" y2="140" stroke="#22d3ee" stroke-width="1"/>
    <line x1="312" y1="372" x2="432" y2="372" stroke="#22d3ee" stroke-width="1"/>
    <line x1="432" y1="300" x2="432" y2="372" stroke="#22d3ee" stroke-width="1"/>
    <line x1="80" y1="432" x2="140" y2="432" stroke="#7c3aed" stroke-width="1"/>
    <line x1="140" y1="432" x2="140" y2="380" stroke="#7c3aed" stroke-width="1"/>
    <line x1="372" y1="80" x2="432" y2="80" stroke="#7c3aed" stroke-width="1"/>
    <line x1="432" y1="80" x2="432" y2="140" stroke="#7c3aed" stroke-width="1"/>
    <circle cx="200" cy="80" r="2" fill="#22d3ee"/>
    <circle cx="200" cy="140" r="2" fill="#22d3ee"/>
    <circle cx="432" cy="372" r="2" fill="#22d3ee"/>
    <circle cx="432" cy="300" r="2" fill="#22d3ee"/>
    <circle cx="140" cy="432" r="2" fill="#7c3aed"/>
    <circle cx="140" cy="380" r="2" fill="#7c3aed"/>
  </g>

  <!-- 外側の六角形シールド（薄い） -->
  <polygon points="256,45 453,158 453,404 256,517 59,404 59,158"
           fill="none" stroke="url(#circuit)" stroke-width="1.5" opacity="0.3"/>

  <!-- 中六角形シールド -->
  <polygon points="256,70 432,172 432,390 256,492 80,390 80,172"
           fill="none" stroke="url(#circuit)" stroke-width="2" opacity="0.5"
           filter="url(#glow)"/>

  <!-- クリスタルコア（六角形の中） -->
  <polygon points="256,110 410,200 410,362 256,452 102,362 102,200"
           fill="url(#crystalCore)" clip-path="url(#hexClip)"/>

  <!-- クリスタルの光の線 -->
  <line x1="256" y1="110" x2="256" y2="452" stroke="#c0a0ff" stroke-width="1" opacity="0.4"/>
  <line x1="256" y1="260" x2="410" y2="200" stroke="#c0a0ff" stroke-width="1" opacity="0.3"/>
  <line x1="256" y1="260" x2="102" y2="200" stroke="#c0a0ff" stroke-width="1" opacity="0.3"/>
  <line x1="256" y1="260" x2="410" y2="362" stroke="#c0a0ff" stroke-width="1" opacity="0.3"/>
  <line x1="256" y1="260" x2="102" y2="362" stroke="#c0a0ff" stroke-width="1" opacity="0.3"/>

  <!-- 中心の光る点 -->
  <circle cx="256" cy="260" r="30" fill="white" opacity="0.9" filter="url(#glowStrong)"/>
  <circle cx="256" cy="260" r="12" fill="#c0a0ff" opacity="1" filter="url(#glow)"/>

  <!-- 六角形シールドの内側（強調） -->
  <polygon points="256,70 432,172 432,390 256,492 80,390 80,172"
           fill="none" stroke="url(#circuit)" stroke-width="2"
           filter="url(#glow)" opacity="0.7"/>

  <!-- 四隅の小さな光点（シールドの頂点） -->
  <circle cx="256" cy="70" r="4" fill="#22d3ee" opacity="0.8" filter="url(#glow)"/>
  <circle cx="432" cy="172" r="4" fill="#22d3ee" opacity="0.8" filter="url(#glow)"/>
  <circle cx="432" cy="390" r="4" fill="#22d3ee" opacity="0.8" filter="url(#glow)"/>
  <circle cx="256" cy="492" r="4" fill="#22d3ee" opacity="0.8" filter="url(#glow)"/>
  <circle cx="80" cy="390" r="4" fill="#22d3ee" opacity="0.8" filter="url(#glow)"/>
  <circle cx="80" cy="172" r="4" fill="#22d3ee" opacity="0.8" filter="url(#glow)"/>

  <!-- 周囲の粒子 -->
  <g opacity="0.5">
    <circle cx="180" cy="130" r="1.5" fill="#22d3ee">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="340" cy="160" r="1.5" fill="#7c3aed">
      <animate attributeName="opacity" values="1;0.3;1" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="400" cy="300" r="1.5" fill="#22d3ee">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="120" cy="340" r="1.5" fill="#7c3aed">
      <animate attributeName="opacity" values="1;0.5;1" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="440" r="1.5" fill="#22d3ee">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="300" cy="420" r="1.5" fill="#7c3aed">
      <animate attributeName="opacity" values="1;0.3;1" dur="3.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- タイトルテキスト -->
  <text x="256" y="310" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="28" font-weight="bold"
        fill="#c0a0ff" filter="url(#glow)" letter-spacing="6"
        opacity="0.9">GUARDIAN</text>
  <text x="256" y="345" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="22" font-weight="bold"
        fill="#22d3ee" filter="url(#glow)" letter-spacing="8"
        opacity="0.9">SHELL</text>

  <!-- バージョン -->
  <text x="256" y="470" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="11"
        fill="#64748b" letter-spacing="3">v0.14.5</text>
</svg>
</div>
<div class="info">
    🛡️ GUARDIAN SHELL — クリスタルコア・ロゴ<br>
    <span style="font-size:11px;opacity:0.5">保存: 右クリック → 名前を付けて画像を保存 / またはスクリーンショット</span>
</div>
</body>
</html>
